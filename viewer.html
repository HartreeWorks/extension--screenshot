<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Screenshot preview</title>
    <link rel="stylesheet" href="viewer.css" />
  </head>
  <body>
    <main class="page">
      <header class="toolbar">
        <div class="hints" aria-label="Annotation hints">
          <span class="hints-label">Annotate:</span>
          <span>drag for arrows, click for text</span>
        </div>
        <div class="toolbar-center">
          <button id="undo-btn" type="button" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6.69 3L3 13"/></svg> Undo</button>
          <button id="save-btn" type="button" class="save-btn"><kbd>⌘S</kbd> Save</button>
          <button id="redo-btn" type="button" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6.69 3L21 13"/></svg> Redo</button>
        </div>
        <div class="actions">
          <span class="shortcuts">
            <span><kbd>⌘C</kbd> Copy</span>
            <span><kbd>⌘I</kbd> Increase quality</span>
          </span>
          <button id="download-btn" type="button" hidden>Download</button>
          <button id="copy-btn" type="button" hidden>Copy</button>
          <button id="retake-hq-btn" type="button" hidden>Increase quality</button>
        </div>
      </header>
      <section class="preview-wrap">
        <div id="editor-shell" class="editor-shell">
          <div id="editor-stage" class="editor-stage" aria-label="Screenshot annotation canvas"></div>
          <textarea
            id="text-editor"
            class="text-editor"
            autocomplete="off"
            spellcheck="false"
            rows="1"
          ></textarea>
        </div>
      </section>
    </main>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="vendor/konva.min.js"></script>
    <script type="module" src="viewer.js"></script>
  </body>
</html>
