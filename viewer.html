<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Screenshot preview</title>
    <link rel="stylesheet" href="viewer.css" />
  </head>
  <body>
    <main class="page">
      <header class="toolbar">
        <h1>Screenshot preview</h1>
        <div class="actions">
          <button id="copy-btn" type="button">Copy image</button>
        </div>
      </header>
      <p id="status" class="status">Loading screenshot...</p>
      <section class="preview-wrap">
        <img id="preview" alt="Captured full-page screenshot" />
      </section>
    </main>
    <script type="module" src="viewer.js"></script>
  </body>
</html>
